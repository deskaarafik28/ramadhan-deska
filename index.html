<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan - Deska</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(#0b1a33,#0f172a);
    color:#facc15;
    text-align:center;
    overflow-x:hidden;
}

/* Bintang */
.star{
    position:fixed;
    width:2px;
    height:2px;
    background:#facc15;
    border-radius:50%;
    opacity:0.8;
    animation:fall linear infinite;
}
@keyframes fall{
    from{transform:translateY(-10px);}
    to{transform:translateY(100vh);}
}

.logo{
    margin-top:30px;
    font-size:40px;
    font-weight:bold;
    text-shadow:0 0 20px #facc15;
}

.dev{color:#ccc;margin-bottom:20px;}

.card{
    background:rgba(30,41,59,0.8);
    margin:20px;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(250,204,21,0.2);
}

.count-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-top:20px;
}

.box{
    background:#1e293b;
    padding:30px 10px;
    border-radius:15px;
}

.box h1{margin:0;font-size:40px;}

button{
    padding:12px 20px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#facc15;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}
button:active{transform:scale(0.95);}
</style>
</head>

<body>

<div class="logo">🌙 DESKA</div>
<div class="dev">Developer: Deska</div>

<!-- COUNTDOWN -->
<div class="card">
<h2>Hitung Mundur Ramadan</h2>
<div class="count-grid">
<div class="box"><h1 id="hari">0</h1>Hari</div>
<div class="box"><h1 id="jam">0</h1>Jam</div>
<div class="box"><h1 id="menit">0</h1>Menit</div>
<div class="box"><h1 id="detik">0</h1>Detik</div>
</div>
</div>

<!-- JADWAL SHOLAT -->
<div class="card">
<h2>🕌 Jadwal Sholat</h2>
<p>Subuh: <span id="subuh">-</span></p>
<p>Dzuhur: <span id="dzuhur">-</span></p>
<p>Ashar: <span id="ashar">-</span></p>
<p>Maghrib: <span id="maghrib">-</span></p>
<p>Isya: <span id="isya">-</span></p>
</div>

<!-- TASBIH -->
<div class="card">
<h2>📿 Tasbih Digital</h2>
<h1 id="tasbihCount">0</h1>
<button onclick="tambahTasbih()">+1</button>
<button onclick="resetTasbih()">Reset</button>
</div>

<!-- MUSIK ISLAMI -->
<div class="card">
<h2>🎵 Lagu Islami</h2>
<button onclick="toggleMusic()">Play / Pause</button>
<audio id="bgMusic" 
src="https://download.quranicaudio.com/qdc/mishari_al_afasy/murattal/001.mp3">
</audio>
</div>

<footer style="margin:40px 0;color:#777;">
© 2026 Ramadan - Developer Deska
</footer>

<script>

/* Efek Bintang */
for(let i=0;i<80;i++){
 let star=document.createElement("div");
 star.className="star";
 star.style.left=Math.random()*100+"vw";
 star.style.animationDuration=(Math.random()*5+5)+"s";
 document.body.appendChild(star);
}

/* Countdown */
let ramadan=new Date("March 23, 2026 00:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=ramadan-now;
 document.getElementById("hari").innerText=Math.floor(d/(1000*60*60*24));
 document.getElementById("jam").innerText=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 document.getElementById("menit").innerText=Math.floor((d%(1000*60*60))/(1000*60));
 document.getElementById("detik").innerText=Math.floor((d%(1000*60))/1000);
},1000);

/* Jadwal Sholat */
navigator.geolocation.getCurrentPosition(pos=>{
 let lat=pos.coords.latitude;
 let lon=pos.coords.longitude;
 fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
 .then(res=>res.json())
 .then(data=>{
   let t=data.data.timings;
   document.getElementById("subuh").innerText=t.Fajr;
   document.getElementById("dzuhur").innerText=t.Dhuhr;
   document.getElementById("ashar").innerText=t.Asr;
   document.getElementById("maghrib").innerText=t.Maghrib;
   document.getElementById("isya").innerText=t.Isha;
 });
});

/* Tasbih */
let count=0;
function tambahTasbih(){
 count++;
 document.getElementById("tasbihCount").innerText=count;
}
function resetTasbih(){
 count=0;
 document.getElementById("tasbihCount").innerText=count;
}

/* Musik */
function toggleMusic(){
 let music=document.getElementById("bgMusic");
 if(music.paused){music.play();}
 else{music.pause();}
}

</script>

</body>
</html>
