<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan App - Deska</title>

<link rel="manifest" href="manifest.json">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:#facc15;
    text-align:center;
    overflow-x:hidden;
}

/* Bintang */
.star{
    position:fixed;
    width:2px;
    height:2px;
    background:white;
    animation:starMove linear infinite;
}

@keyframes starMove{
    from{transform:translateY(-10px);}
    to{transform:translateY(100vh);}
}

.logo{
    font-size:35px;
    font-weight:bold;
    color:#facc15;
    text-shadow:0 0 15px #facc15;
    margin-top:20px;
}

.card{
    background:#1e293b;
    margin:15px;
    padding:20px;
    border-radius:15px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#facc15;
    color:black;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="logo">🌙 DESKA</div>
<p>Developer: Deska</p>

<div class="card">
<h2>Hitung Mundur Ramadan</h2>
<div>
<span id="hari">0</span> Hari |
<span id="jam">0</span> Jam |
<span id="menit">0</span> Menit |
<span id="detik">0</span> Detik
</div>
</div>

<div class="card">
<h2>🕌 Jadwal Sholat (Auto Lokasi)</h2>
<p>Subuh: <span id="subuh">-</span></p>
<p>Dzuhur: <span id="dzuhur">-</span></p>
<p>Ashar: <span id="ashar">-</span></p>
<p>Maghrib: <span id="maghrib">-</span></p>
<p>Isya: <span id="isya">-</span></p>
</div>

<div class="card">
<h2>🔔 Notifikasi</h2>
<button onclick="aktifNotif()">Aktifkan Notifikasi</button>
</div>

<footer style="margin-top:30px;color:#64748b;">
© 2026 Ramadan App - Developer Deska
</footer>

<script>

/* Bintang */
for(let i=0;i<100;i++){
 let star=document.createElement("div");
 star.className="star";
 star.style.left=Math.random()*100+"vw";
 star.style.animationDuration=(Math.random()*5+5)+"s";
 document.body.appendChild(star);
}

/* Countdown */
let ramadan=new Date("March 23, 2026 00:00:00").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=ramadan-now;

 document.getElementById("hari").innerText=Math.floor(d/(1000*60*60*24));
 document.getElementById("jam").innerText=Math.floor((d%(1000*60*60*24))/(1000*60*60));
 document.getElementById("menit").innerText=Math.floor((d%(1000*60*60))/(1000*60));
 document.getElementById("detik").innerText=Math.floor((d%(1000*60))/1000);
},1000);

/* Jadwal Sholat API */
navigator.geolocation.getCurrentPosition(pos=>{
 let lat=pos.coords.latitude;
 let lon=pos.coords.longitude;

 fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=2`)
 .then(res=>res.json())
 .then(data=>{
   let t=data.data.timings;
   document.getElementById("subuh").innerText=t.Fajr;
   document.getElementById("dzuhur").innerText=t.Dhuhr;
   document.getElementById("ashar").innerText=t.Asr;
   document.getElementById("maghrib").innerText=t.Maghrib;
   document.getElementById("isya").innerText=t.Isha;
 });
});

/* Notifikasi */
function aktifNotif(){
 if(Notification.permission!=="granted"){
   Notification.requestPermission();
 }
 alert("Notifikasi Aktif");
}

setInterval(()=>{
 let now=new Date();
 let time=now.getHours()+":"+String(now.getMinutes()).padStart(2,'0');

 let maghrib=document.getElementById("maghrib").innerText;
 let subuh=document.getElementById("subuh").innerText;

 if(time===subuh){
   new Notification("Waktu Sahur 🌙 - Developer Deska");
 }
 if(time===maghrib){
   new Notification("Waktu Berbuka 🍽️ - Developer Deska");
 }
},60000);

</script>

</body>
</html>
